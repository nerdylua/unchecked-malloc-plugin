<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MallocGuard - Live Static Analyzer</title>
    <meta name="description" content="A live web-based Clang AST checker that detects unchecked malloc return values in C code.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <header id="app-header">
        <div class="header-left">
            <div class="logo">
                <span class="logo-icon">*</span>
                <h1>MallocGuard</h1>
            </div>
            <span class="subtitle">Live Static Analyzer</span>
        </div>
        <div class="header-center">
            <div class="preset-group">
                <label for="preset-select">Example</label>
                <select id="preset-select">
                    <option value="">Choose a test file</option>
                </select>
            </div>
        </div>
        <div class="header-right">
            <button id="analyze-btn" onclick="runAnalysis()">
                <span class="btn-icon">&#9654;</span>
                <span class="btn-text">Analyze</span>
            </button>
        </div>
    </header>

    <main id="app-main">
        <section id="editor-panel" class="panel">
            <div class="panel-header">
                <span class="panel-title">Source Code</span>
                <span class="panel-badge" id="line-count">0 lines</span>
            </div>
            <div class="editor-wrapper">
                <div class="line-numbers" id="line-numbers"></div>
                <textarea id="code-editor" spellcheck="false"
                    placeholder="Paste your C code here, or load a preset example...">#include &lt;stdlib.h&gt;

void example() {
    int *ptr = (int *)malloc(sizeof(int));
    *ptr = 42;  // Bug: no NULL check!
}
</textarea>
            </div>
        </section>

        <section id="results-panel" class="panel">
            <div class="panel-header">
                <div class="tab-group">
                    <button class="tab active" data-tab="results" onclick="switchTab('results')">Results</button>
                    <button class="tab" data-tab="ast" onclick="switchTab('ast')">AST</button>
                </div>
                <span class="panel-badge" id="warning-count">Ready</span>
            </div>
            <div id="results-content" class="tab-content active">
                <div class="empty-state" id="empty-state">
                    <div class="empty-icon">?</div>
                    <p>Click <strong>Analyze</strong> to run the checker</p>
                    <p class="dim">Or press <kbd>Ctrl</kbd>+<kbd>Enter</kbd></p>
                </div>
                <div id="diagnostics-list"></div>
            </div>
            <div id="ast-content" class="tab-content">
                <div class="empty-state" id="ast-empty">
                    <div class="empty-icon">{}</div>
                    <p>Click <strong>Analyze</strong> to view the AST</p>
                </div>
                <div id="ast-views" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
                    <div class="ast-toolbar">
                        <div class="view-toggle">
                            <button class="view-btn active" data-view="graph" onclick="switchAstView('graph')">Graph</button>
                            <button class="view-btn" data-view="list" onclick="switchAstView('list')">List</button>
                        </div>
                        <button id="ast-fit-btn" class="view-btn" type="button">Fit graph</button>
                    </div>
                    <div id="ast-graph-view" class="ast-view active" aria-label="Expandable abstract syntax tree graph">
                        <svg id="ast-svg" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Abstract syntax tree"></svg>
                    </div>
                    <div id="ast-list-view" class="ast-view">
                        <div id="ast-tree"></div>
                    </div>
                    <aside id="ast-inspector" class="ast-inspector" aria-live="polite">
                        <span class="ast-inspector-placeholder">Select a node to inspect its Clang details.</span>
                    </aside>
                </div>
            </div>
        </section>
    </main>

    <footer id="status-bar">
        <span id="status-text">Ready</span>
        <div id="status-right" style="display: flex; gap: 16px; align-items: center;">
            <span id="status-stats" style="color: var(--color-on-dark-soft); font-family: 'JetBrains Mono', monospace;"></span>
            <span id="status-info">Clang AST Matcher Plugin</span>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
